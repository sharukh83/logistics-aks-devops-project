{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: logistics-ingress
  namespace: logistics
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2    # captures everything after the path prefix
spec:
  ingressClassName: {{ .Values.ingress.className }}
  
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
{{- range .Values.ingress.services }}
          - path: {{ .path }}(/|$)(.*)              # regex: pass subpaths correctly
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .name }}
                port:
                  number: {{ .port }}              # per-service port from values
{{- end }}
{{- end }}