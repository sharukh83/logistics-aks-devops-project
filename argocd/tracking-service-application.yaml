apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tracking-service
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/sharukh83/logistics-aks-devops-project.git
    targetRevision: main
    path: helm/logistics-service
    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: logistics

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true