trigger:
  branches:
    include:
      - main
  paths:
    include:
      - app/*
      - pipelines/*
    exclude:
      - helm/*

pool:
  vmImage: ubuntu-latest

variables:
  acrName: 'logisticsacr3507'
  acrLoginServer: 'logisticsacr3507.azurecr.io'
  imageName: 'tracking-service'
  imageTag: '$(Build.BuildId)'
  helmValuesFile: 'helm/logistics-service/values.yaml'

stages:
  - stage: BuildScanPush
    displayName: Build, Scan and Push Docker Image
    jobs:
      - job: BuildScanPushJob
        displayName: Build, Scan and Push Image to ACR
        steps:
          - checkout: self

          - script: |
              set -e

              echo "Logging in to Azure using Service Principal"
              az login \
                --service-principal \
                --username "$AZURE_CLIENT_ID" \
                --password "$AZURE_CLIENT_SECRET" \
                --tenant "$AZURE_TENANT_ID"

              echo "Logging in to Azure Container Registry"
              az acr login --name $(acrName)

              IMAGE="$(acrLoginServer)/$(imageName):$(imageTag)"
              echo "Docker image: $IMAGE"

              echo "Building Docker image"
              docker build -t $IMAGE -f app/Dockerfile app

              echo "Running Trivy image scan"
              docker run --rm \
                -v /var/run/docker.sock:/var/run/docker.sock \
                aquasec/trivy:latest image \
                --severity HIGH,CRITICAL \
                --ignore-unfixed \
                --exit-code 0 \
                $IMAGE

              echo "Pushing Docker image to ACR"
              docker push $IMAGE

              echo "Image pushed successfully: $IMAGE"
            displayName: Build, scan and push Docker image
            env:
              AZURE_CLIENT_ID: $(AZURE_CLIENT_ID)
              AZURE_CLIENT_SECRET: $(AZURE_CLIENT_SECRET)
              AZURE_TENANT_ID: $(AZURE_TENANT_ID)

  - stage: UpdateGitOps
    displayName: Update Helm Image Tag
    dependsOn: BuildScanPush
    condition: succeeded()
    jobs:
      - job: UpdateHelmValues
        displayName: Update values.yaml and push to Git
        steps:
          - checkout: self
            persistCredentials: true

          - script: |
              set -e

              echo "Current image section before update:"
              grep -A 5 "image:" $(helmValuesFile)

              echo "Updating image tag to $(imageTag)"

              sed -i "s/^[[:space:]]*tag:.*/  tag: $(imageTag)/" $(helmValuesFile)

              echo "Image section after update:"
              grep -A 5 "image:" $(helmValuesFile)

              echo "Git diff:"
              git diff $(helmValuesFile)

              git config user.email "azure-pipeline@local"
              git config user.name "azure-pipeline"

              git add $(helmValuesFile)

              if git diff --cached --quiet; then
                echo "No changes detected in values.yaml"
              else
                git commit -m "Update image tag to $(imageTag) [skip ci]"
                git push origin HEAD:main
              fi
            displayName: Update Helm values and push