trigger:
  branches:
    include:
      - main
  paths:
    include:
      - app/*
      - pipelines/*

pool:
  vmImage: ubuntu-latest

variables:
  acrName: 'logisticsacr3507'
  acrLoginServer: 'logisticsacr3507.azurecr.io'
  imageName: 'tracking-service'
  imageTag: '$(Build.BuildId)'

stages:
  - stage: BuildAndPush
    displayName: Build and Push Docker Image
    jobs:
      - job: BuildAndPushJob
        displayName: Build and Push Image to ACR
        steps:
          - checkout: self

          - script: |
              set -e

              echo "Logging in to Azure using Service Principal"
              az login \
                --service-principal \
                --username "$AZURE_CLIENT_ID" \
                --password "$AZURE_CLIENT_SECRET" \
                --tenant "$AZURE_TENANT_ID"

              echo "Logging in to Azure Container Registry"
              az acr login --name $(acrName)

              IMAGE="$(acrLoginServer)/$(imageName):$(imageTag)"
              echo "Docker image: $IMAGE"

              echo "Building Docker image"
              docker build -t $IMAGE -f app/Dockerfile app

              echo "Pushing Docker image to ACR"
              docker push $IMAGE

              echo "Image pushed successfully: $IMAGE"
            displayName: Build and Push Docker Image
            env:
              AZURE_CLIENT_ID: $(AZURE_CLIENT_ID)
              AZURE_CLIENT_SECRET: $(AZURE_CLIENT_SECRET)
              AZURE_TENANT_ID: $(AZURE_TENANT_ID)