apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracking-service
  namespace: logistics
  labels:
    app: tracking-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tracking-service
  template:
    metadata:
      labels:
        app: tracking-service
    spec:
      containers:
        - name: tracking-service
          image: logisticsacr3507.azurecr.io/tracking-service:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: APP_NAME
              value: "tracking-service"
            - name: APP_VERSION
              value: "v1"
            - name: ENVIRONMENT
              value: "dev"
          readinessProbe:
            httpGet:
              path: /ready
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"